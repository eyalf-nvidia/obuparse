name: PyObuParse CI/CD

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ] # For PyPI publishing
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff # Using ruff for combined linting and formatting check
      - name: Run Ruff linter
        run: ruff check src tests
      - name: Run Ruff formatter (check mode)
        run: ruff format --check src tests

  build_and_test:
    name: Build & Test - Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.7', '3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive' # If obuparse.c was a submodule

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (build tools, pytest)
        run: |
          python -m pip install --upgrade pip
          pip install wheel setuptools pytest
          # For Windows, ensure C build tools are available (usually pre-installed on GitHub runners)
          # For Linux, build-essential equivalent is usually pre-installed.
          # For macOS, Xcode command line tools are usually pre-installed.

      - name: Build package with C extension
        run: |
          pip install . --verbose # Builds and installs the package

      - name: Run tests
        run: |
          pytest tests/

  build_docs:
    runs-on: ubuntu-latest
    needs: [lint, build_and_test] # Run after lint and tests pass
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' # Only on main/master branch
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . # Install package itself for sphinx to import
          pip install sphinx sphinx-rtd-theme # Or alabaster if that's the theme
      - name: Build Sphinx documentation
        run: |
          sphinx-build -b html docs docs/_build/html
      # Optional: Upload docs artifact
      - uses: actions/upload-artifact@v4
        with:
          name: sphinx-docs-html
          path: docs/_build/html/
      # Optional: Deploy to GitHub Pages (more involved setup needed for gh-pages branch and token)

  publish_to_pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [lint, build_and_test] # Ensure tests pass before publishing
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https_://pypi.org/p/pyobuparse # Replace with your package name
    permissions:
      id-token: write # Required for trusted publishing
    
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build package (sdist and wheel)
        run: python -m build
      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # with:
        #   user: __token__
        #   password: ${{ secrets.PYPI_API_TOKEN }} # Store API token as a secret in GitHub repo settings
                                                  # For trusted publishing, token is not needed here.

name: Python Package CI

on:
  push:
    branches: [ main ] # Or your default branch, e.g., master
  pull_request:
    branches: [ main ] # Or your default branch

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"] # Can expand to e.g. ["3.7", "3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
      with:
        # Necessary for setuptools_scm to dynamically get version from Git tags
        fetch-depth: 0 

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential python3-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install wheel # Ensure wheel is available for building
        # Install build dependencies for the package itself (setuptools, setuptools_scm)
        # These are usually pulled in by "pip install ." if using PEP 517/518
        # but explicitly installing them can be safer in CI.
        pip install setuptools setuptools_scm[toml]
        # Install test and docs dependencies
        pip install pytest sphinx sphinx_rtd_theme toml
        # For setuptools_scm to work correctly when the package is not yet installed
        # (e.g. when sphinx tries to import it to get version)
        # it needs to be able to build the egg-info.
        # Running this pre-populates .egg-info which helps sphinx find the version.
        python pyobuparse/setup.py egg_info --egg-base /tmp/tmp-egg-info

    - name: Build and install pyobuparse
      run: |
        pip install ./pyobuparse --verbose

    - name: Run tests
      run: |
        pytest pyobuparse/tests

    - name: Build Sphinx documentation
      run: |
        cd pyobuparse/docs
        # -W treats warnings as errors
        # --keep-going allows the build to continue to find all warnings on first failure
        python -m sphinx -W --keep-going -b html . _build 
        # Check if _build/html/index.html exists as a basic success indicator
        test -f _build/html/index.html
        cd ../.. # Return to root for next steps if any
